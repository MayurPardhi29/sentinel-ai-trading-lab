apiVersion: apps/v1

kind: Deployment

metadata:

  name: market-data

spec:

  replicas: 1

  selector:

    matchLabels:

      app: market-data

  template:

    metadata:

      labels:

        app: market-data

    spec:

      containers:
        - name: market-data
          image: sentinel-ai-trading-lab-market-data
          imagePullPolicy: Never
          
          env:
            - name: TWELVEDATA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: twelvedata-secret
                  key: api-key


          ports:

            - containerPort: 8080