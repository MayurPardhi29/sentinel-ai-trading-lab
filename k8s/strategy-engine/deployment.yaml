apiVersion: apps/v1

kind: Deployment

metadata:

  name: strategy-engine

spec:

  replicas: 1

  selector:

    matchLabels:

      app: strategy-engine

  template:

    metadata:

      labels:

        app: strategy-engine

    spec:

      containers:

        - name: strategy-engine

          image: sentinel-ai-trading-lab-strategy-engine

          imagePullPolicy: Never

          ports:

            - containerPort: 8081

          env:

            - name: MARKET_DATA_URL

              value: "http://market-data:8080"